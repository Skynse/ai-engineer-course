<svg xmlns="http://www.w3.org/2000/svg" width="858" height="400" viewBox="0 0 858 400" role="img" aria-labelledby="title desc">
  <title>Local TODO App Flow</title>
  <desc>What happens before a backend is added</desc>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#314056" />
    </marker>
  </defs>
  <rect width="858" height="400" fill="#f6f1e7" rx="30" ry="30" />
  <rect x="10" y="10" width="838" height="380" fill="#fffdfa" rx="26" ry="26" stroke="#ede7da" />

  <text x="429.0" y="40" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#182033">Local TODO App Flow</text>
  <text x="429.0" y="65" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#5a6478">What happens before a backend is added</text>

  <path d="M 262.0 158.0 L 288.5 158.0 Q 289.0 158.0 289.0 158.0 L 289.0 158.0 Q 289.0 158.0 289.5 158.0 L 316.0 158.0" fill="none" stroke="#314056" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrowhead)" />

  <rect x="249.0" y="143.0" width="80" height="24" rx="12"
        fill="#f6f1e7" />
  <text x="289.0" y="160.0" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#5a6478">submit</text>

  <path d="M 542.0 158.0 L 568.5 158.0 Q 569.0 158.0 569.0 158.0 L 569.0 158.0 Q 569.0 158.0 569.5 158.0 L 596.0 158.0" fill="none" stroke="#314056" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrowhead)" />

  <rect x="529.0" y="143.0" width="80" height="24" rx="12"
        fill="#f6f1e7" />
  <text x="569.0" y="160.0" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#5a6478">render</text>

  <path d="M 596.0 158.0 L 582.5 158.0 Q 569.0 158.0 569.0 171.5 L 569.0 312.5 Q 569.0 326.0 555.5 326.0 L 542.0 326.0" fill="none" stroke="#314056" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
        marker-end="url(#arrowhead)" />

  <rect x="529.0" y="227.0" width="80" height="24" rx="12"
        fill="#f6f1e7" />
  <text x="569.0" y="244.0" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#5a6478">reload</text>

  <rect x="40" y="121" width="226" height="86" rx="22" ry="22"
        fill="#d7d0c2" opacity="0.28" />
  <rect x="36" y="115" width="226" height="86" rx="22" ry="22"
        fill="#dff3f7" stroke="#126e82" stroke-width="2.5" />
  <text x="149.0" y="162.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">You type a task</text>

  <rect x="320" y="118" width="226" height="92" rx="22" ry="22"
        fill="#d7d0c2" opacity="0.28" />
  <rect x="316" y="112" width="226" height="92" rx="22" ry="22"
        fill="#fffdfa" stroke="#243042" stroke-width="2.5" />
  <text x="429.0" y="151.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">React state</text>
  <text x="429.0" y="173.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">updates locally</text>

  <rect x="600" y="118" width="226" height="92" rx="22" ry="22"
        fill="#d7d0c2" opacity="0.28" />
  <rect x="596" y="112" width="226" height="92" rx="22" ry="22"
        fill="#fffdfa" stroke="#243042" stroke-width="2.5" />
  <text x="709.0" y="151.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">Page re-renders</text>
  <text x="709.0" y="173.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">with the new list</text>

  <rect x="320" y="286" width="226" height="92" rx="22" ry="22"
        fill="#d7d0c2" opacity="0.28" />
  <rect x="316" y="280" width="226" height="92" rx="22" ry="22"
        fill="#dff3f7" stroke="#126e82" stroke-width="2.5" />
  <text x="429.0" y="319.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">Browser refresh</text>
  <text x="429.0" y="341.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#182033">resets the data</text>
</svg>
